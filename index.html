<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citas Psicología</title>
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>
    <div class="container">
        <h2>Reserva tu Cita Psicológica</h2>
        <p>Invierte en tu bienestar emocional. Elige el horario que mejor se adapte a ti.</p>
        
        <form id="appointmentForm">
            <div class="input-group">
                <label for="name">Nombre Completo:</label>
                <input type="text" id="name" required placeholder="Ej. Juan Pérez">
            </div>

            <div class="input-group">
                <label for="email">Correo Electrónico:</label>
                <input type="email" id="email" required placeholder="juan@correo.com">
            </div>

            <div class="input-group">
                <label for="date">Selecciona la Fecha:</label>
                <input type="date" id="date" required>
            </div>

            <div class="input-group">
                <label for="time">Selecciona la Hora:</label>
                <input type="time" id="time" required>
            </div>

            <button type="submit" id="submitBtn">Agendar Cita</button>
        </form>

        <div id="confirmationMessage" class="hidden"></div>
    </div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.js"></script>
    <script type="text/javascript">
        // Pega tu Public Key aquí adentro de las comillas
        emailjs.init("2vU1t1EbvESzgsEW9");
    </script>

    <script src="calculator.js"></script>
</body>
